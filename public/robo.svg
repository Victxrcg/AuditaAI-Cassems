<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="robotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3367d6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Base circular -->
  <circle cx="200" cy="320" r="50" fill="#E8EAED" filter="url(#shadow)"/>
  <!-- Corpo do rob¶ -->
  <rect x="120" y="160" width="160" height="140" rx="16" fill="url(#robotGrad)" filter="url(#shadow)"/>
  <!-- Cabeþa -->
  <rect x="150" y="90" width="100" height="80" rx="12" fill="url(#robotGrad)"/>
  <!-- Olhos -->
  <ellipse cx="175" cy="125" rx="12" ry="14" fill="white"/>
  <ellipse cx="225" cy="125" rx="12" ry="14" fill="white"/>
  <ellipse cx="178" cy="127" rx="5" ry="6" fill="#3367d6"/>
  <ellipse cx="228" cy="127" rx="5" ry="6" fill="#3367d6"/>
  <!-- Antena -->
  <line x1="200" y1="90" x2="200" y2="55" stroke="#5f6368" stroke-width="4" stroke-linecap="round"/>
  <circle cx="200" cy="50" r="8" fill="#34a853"/>
  <!-- Chave de fenda -->
  <g transform="rotate(-45 200 230)">
    <rect x="185" y="195" width="30" height="8" rx="2" fill="#5f6368"/>
    <rect x="200" y="170" width="8" height="50" rx="2" fill="#5f6368"/>
    <rect x="196" y="165" width="16" height="12" rx="2" fill="#80868b"/>
  </g>
  <!-- Rodas -->
  <circle cx="170" cy="320" r="20" fill="#5f6368"/>
  <circle cx="170" cy="320" r="10" fill="#80868b"/>
  <circle cx="230" cy="320" r="20" fill="#5f6368"/>
  <circle cx="230" cy="320" r="10" fill="#80868b"/>
</svg>
